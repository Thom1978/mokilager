<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MOKILager – Lagerverwaltung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-logo">
        <img src="https://ooe.moki.at/wp-content/uploads/2019/04/moki_logo_400.png" 
             alt="MOKI Logo" 
             onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
        <div id="logo-fallback" class="logo-fallback" style="display:none">
          <span class="logo-fallback-text">MOKI</span>
        </div>
      </div>
      <div class="login-title">
        <h1>MOKILager</h1>
        <p>Lagerverwaltungssystem</p>
      </div>
      <form id="login-form" class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Benutzername</label>
          <input type="text" id="login-username" placeholder="Benutzername" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Passwort</label>
          <input type="password" id="login-password" placeholder="Passwort" required autocomplete="current-password">
        </div>
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block">
          <span>Anmelden</span>
        </button>
      </form>
      <div class="login-footer">OÖ MOKI – Mobile Kinderkrankenpflege OÖ</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app" style="display:none">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <img src="https://ooe.moki.at/wp-content/uploads/2019/04/moki_logo_400.png" 
             alt="MOKI" class="sidebar-logo"
             onerror="this.style.display='none'">
        <div class="sidebar-title">
          <span class="sidebar-app-name">MOKILager</span>
          <span id="sidebar-role" class="sidebar-role-badge"></span>
        </div>
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info">
          <div id="sidebar-username" class="user-name">-</div>
          <div id="sidebar-email" class="user-role">-</div>
        </div>
      </div>

      <ul class="sidebar-nav" id="sidebar-nav">
        <!-- Dynamically filled -->
      </ul>

      <div class="sidebar-bottom">
        <button class="btn-sidebar-logout" onclick="logout()">⇦ Abmelden</button>
      </div>
    </nav>

    <!-- Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Main content -->
    <div class="main-content">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h2 id="page-title" class="page-title">Dashboard</h2>
        <div class="topbar-right">
          <span id="topbar-user" class="topbar-user"></span>
        </div>
      </header>

      <main id="content" class="content-area">
        <!-- Rendered by JS -->
      </main>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast-container" class="toast-container"></div>

  <!-- QR Scanner -->
  <div id="qr-scanner-overlay" class="qr-scanner-overlay" style="display:none">
    <div class="qr-scanner-box">
      <div class="qr-scanner-header">
        <h3>QR-Code scannen</h3>
        <button onclick="closeQRScanner()">✕</button>
      </div>
      <div id="qr-reader" style="width:100%"></div>
      <div class="qr-scanner-footer">
        <p>Halten Sie den QR-Code in die Kamera</p>
        <button class="btn btn-secondary" onclick="closeQRScanner()">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
